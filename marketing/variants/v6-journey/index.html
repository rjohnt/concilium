<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="assets/vendor/gsap.min.js"></script>
    <script src="assets/vendor/three.min.js"></script>
    <style>
      @font-face {
        font-family: "Bricolage Grotesque";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Bricolage-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Hanken-normal.woff2") format("woff2");
      }
      :root {
        --coral: #e85d34; --coral-light: #f07e5c; --coral-deep: #cf4a28;
        --cream: #fcfaf6; --ink: #2b221c;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #120c08; }
      body { font-family: "Hanken Grotesk", sans-serif; }
      .display { font-family: "Bricolage Grotesque", sans-serif; }

      #stage { position: absolute; inset: 0; width: 1920px; height: 1080px; }
      #bg {
        position: absolute; inset: 0; z-index: 0;
        background: radial-gradient(120% 90% at 50% 38%, #382c22 0%, #261c14 42%, #150e09 100%);
      }
      #three-layer { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
      #vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(115% 85% at 50% 42%, transparent 55%, rgba(8, 5, 3, 0.5) 100%);
      }
      #grain {
        position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: 0.05;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }
      #warmwash {
        position: absolute; inset: 0; z-index: 4; opacity: 0; pointer-events: none;
        background: radial-gradient(120% 100% at 50% 45%, #fffaf3 0%, #fdf3ea 45%, #f7e7d8 100%);
      }

      .scene {
        position: absolute; inset: 0; z-index: 6;
        display: flex; flex-direction: column; align-items: center;
        text-align: center; padding: 110px 180px;
        opacity: 0; visibility: hidden;
      }
      .headline {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; color: var(--cream);
        line-height: 1.05; letter-spacing: -0.025em;
        text-shadow: 0 4px 34px rgba(8, 5, 3, 0.6);
      }
      .accent { color: var(--coral-light); }

      /* type rides the upper third; the ticket is the star */
      #s1, #s2, #s3 { justify-content: flex-start; padding-top: 116px; }
      #s1 .headline { font-size: 96px; }
      #s2 .headline { font-size: 84px; }
      #s3 .headline { font-size: 90px; }

      /* lockup */
      #s6 { justify-content: center; }
      #s6 .lockrow { display: flex; align-items: center; gap: 28px; }
      #s6 .mark { position: relative; width: 110px; height: 110px; }
      #s6 .mark i { position: absolute; border-radius: 50%; display: block; }
      #s6 .peb-coral { width: 42px; height: 42px; background: #e85d34; left: 34px; top: 12px; }
      #s6 .peb-iris  { width: 42px; height: 42px; background: #7a57d1; left: 15px; top: 46px; }
      #s6 .peb-teal  { width: 42px; height: 42px; background: #1e9c86; left: 53px; top: 46px; }
      #s6 .peb-dot   { width: 21px; height: 21px; background: #2b221c; left: 45px; top: 47px; }
      #s6 .brand {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 100px; color: var(--ink); letter-spacing: -0.03em;
      }
      #s6 .tagline { margin-top: 20px; font-weight: 500; font-size: 38px; color: var(--coral-deep); }
      #s6 .cta {
        margin-top: 44px; display: inline-flex; align-items: center; gap: 14px;
        background: var(--coral); color: #fff;
        font-weight: 600; font-size: 26px; padding: 18px 36px; border-radius: 999px;
        box-shadow: 0 18px 44px rgba(232, 93, 52, 0.32);
      }

      /* settled elements: quad-mark lockup, CTA-2 line, A/E interstitials */
      #s6 .marksvg { width: 112px; height: 112px; overflow: visible; }
      .ctaline2 {
        margin-top: 44px; font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 36px; letter-spacing: -0.02em; color: #2b221c;
      }
      .dots4 { display: inline-flex; gap: 9px; margin-left: 14px; vertical-align: middle; }
      .dots4 b { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
      .ulbar { height: 6px; border-radius: 3px; background: #E85D34; margin-top: 20px; width: 280px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="26" data-width="1920" data-height="1080">
      <audio id="bed" class="clip" src="assets/music.m4a" data-start="0" data-duration="26" data-track-index="9" data-volume="0.85"></audio>
      <div id="stage">
        <div id="bg" data-layout-ignore></div>
        <canvas id="three-layer" width="1920" height="1080" data-layout-ignore></canvas>
        <div id="vignette" data-layout-ignore></div>
        <div id="grain" data-layout-ignore></div>
        <div id="warmwash" data-layout-ignore></div>

        <!-- 1 · one ticket -->
        <div id="s1" class="scene">
          <div class="headline display">Every ticket takes <span class="accent">a journey.</span></div>
        </div>

        <!-- 2 · four verdicts -->
        <div id="s2" class="scene">
          <div class="headline display">Past every seat. <span class="accent">Four verdicts.</span></div>
        </div>

        <!-- 3 · then it ships -->
        <div id="s3" class="scene">
          <div class="headline display">Consensus reached. <span class="accent">It ships.</span></div>
        </div>

        <!-- 6 · lockup -->
        <div id="s6" class="scene">
          <div class="lockrow">
            <svg class="marksvg" viewBox="0 0 120 120" fill="none">
              <g transform="rotate(45 60 60)">
                <g class="pq1"><circle cx="44" cy="44" r="24" fill="#7A57D1"></circle></g>
                <g class="pq2"><circle cx="76" cy="44" r="24" fill="#D9962A"></circle></g>
                <g class="pq3"><circle cx="44" cy="76" r="24" fill="#2F82C7"></circle></g>
                <g class="pq4"><circle cx="76" cy="76" r="24" fill="#1E9C86"></circle></g>
              </g>
              <g class="dotg"><circle cx="60" cy="60" r="14" fill="#2B221C"></circle></g>
            </svg>
            <div class="brand display">Concilium</div>
          </div>
          <div class="ctaline2">Convene your council.<span class="dots4"><b style="background:#7A57D1"></b><b style="background:#D9962A"></b><b style="background:#1E9C86"></b><b style="background:#2F82C7"></b></span></div>
        </div>
      </div>
    </div>

    <script src="assets/vendor/scene.js"></script>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const E = "power3.out";
        function scene(sel, start, end, inDur, outDur) {
          tl.fromTo(sel, { autoAlpha: 0 }, { autoAlpha: 1, duration: inDur, ease: "power2.out" }, start);
          tl.to(sel, { autoAlpha: 0, duration: outDur, ease: "power2.in" }, end - outDur);
        }

        /* 1 · journey begins (0.4–4.8) */
        scene("#s1", 0.4, 4.8, 0.7, 0.5);
        tl.fromTo("#s1 .headline",
          { y: 42, opacity: 0, filter: "blur(12px)" },
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.9, ease: E }, 0.6);

        /* 2 · four verdicts (6.2–15.0) — rides over the stamp laps */
        scene("#s2", 6.2, 15.0, 0.6, 0.5);
        tl.from("#s2 .headline", { y: 32, opacity: 0, duration: 0.7, ease: E }, 6.4);

        /* 3 · it ships (15.8–20.2) */
        scene("#s3", 15.8, 20.2, 0.6, 0.5);
        tl.from("#s3 .headline", { y: 34, opacity: 0, duration: 0.7, ease: E }, 16.0);

        /* portal flash → warm wash for the lockup */
        tl.fromTo("#warmwash", { autoAlpha: 0 }, { autoAlpha: 0.97, duration: 1.3, ease: "power2.inOut" }, 19.9);

        /* 6 · lockup (20.6–26) */
        tl.fromTo("#s6", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.6, ease: "power2.out" }, 20.6); // lockup holds to the end
        tl.from("#s6 .pq1", { x: -72, y: -72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 20.75);
        tl.from("#s6 .pq2", { x: 72, y: -72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 20.75 + 0.12);
        tl.from("#s6 .pq3", { x: -72, y: 72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 20.75 + 0.24);
        tl.from("#s6 .pq4", { x: 72, y: 72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 20.75 + 0.36);
        tl.from("#s6 .dotg", { scale: 0, svgOrigin: "60 60", opacity: 0, duration: 0.4, ease: "back.out(2)" }, 20.75 + 0.66);
        tl.from("#s6 .brand", { x: -24, opacity: 0, duration: 0.6, ease: E }, 21.35);
        tl.from("#s6 .ctaline2", { y: 20, opacity: 0, duration: 0.55, ease: E }, 22.1);
        tl.from("#s6 .dots4 b", { scale: 0, opacity: 0, duration: 0.26, stagger: 0.11, ease: "back.out(2)" }, 22.1 + 0.5);

        /* anchor: pad the timeline to the composition end so seeks past the
           last tween never reset to initial state (blank final frames) */
        tl.set("#root", { autoAlpha: 1 }, 25.98);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
