<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="assets/vendor/gsap.min.js"></script>
    <script src="assets/vendor/three.min.js"></script>
    <style>
      @font-face {
        font-family: "Bricolage Grotesque";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Bricolage-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Hanken-normal.woff2") format("woff2");
      }
      :root {
        --coral: #e85d34; --coral-light: #f07e5c;
        --cream: #fcfaf6;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #110b07; }
      body { font-family: "Hanken Grotesk", sans-serif; }
      .display { font-family: "Bricolage Grotesque", sans-serif; }
      .mono { font-family: "JetBrains Mono", monospace; }

      #stage { position: absolute; inset: 0; width: 1920px; height: 1080px; }
      #bg {
        position: absolute; inset: 0; z-index: 0;
        background: radial-gradient(130% 100% at 50% 30%, #33271d 0%, #221810 46%, #110b07 100%);
      }
      #three-layer { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
      #vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(115% 85% at 50% 45%, transparent 55%, rgba(6, 4, 2, 0.55) 100%);
      }
      #grain {
        position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: 0.05;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }

      .scene {
        position: absolute; inset: 0; z-index: 6;
        display: flex; flex-direction: column; align-items: center;
        text-align: center; padding: 110px 180px;
        opacity: 0; visibility: hidden;
      }
      .headline {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; color: var(--cream);
        line-height: 1.05; letter-spacing: -0.025em;
        text-shadow: 0 4px 36px rgba(5, 3, 2, 0.65);
      }
      .accent { color: var(--coral-light); }

      #s1 { justify-content: flex-start; padding-top: 124px; }
      #s1 .headline { font-size: 100px; }

      /* small status caption that rides the build */
      #s2 { justify-content: flex-end; padding-bottom: 88px; }
      #s2 .status {
        display: inline-flex; align-items: center; gap: 13px;
        padding: 14px 26px; border-radius: 999px;
        background: rgba(20, 13, 8, 0.66);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 21px; letter-spacing: 0.07em; color: #f1e2cc;
        backdrop-filter: blur(6px);
      }
      #s2 .status .pulse {
        width: 13px; height: 13px; border-radius: 50%;
        background: var(--coral);
        box-shadow: 0 0 16px rgba(232, 93, 52, 0.8);
      }

      #s3 { justify-content: flex-start; padding-top: 124px; }
      #s3 .headline { font-size: 104px; }

      /* dark lockup */
      #s6 { justify-content: center; }
      #s6 .lockrow { display: flex; align-items: center; gap: 28px; }
      #s6 .mark { position: relative; width: 110px; height: 110px; }
      #s6 .mark i { position: absolute; border-radius: 50%; display: block; }
      #s6 .peb-coral { width: 42px; height: 42px; background: #e85d34; left: 34px; top: 12px; box-shadow: 0 0 32px rgba(232,93,52,0.55); }
      #s6 .peb-iris  { width: 42px; height: 42px; background: #7a57d1; left: 15px; top: 46px; box-shadow: 0 0 32px rgba(122,87,209,0.5); }
      #s6 .peb-teal  { width: 42px; height: 42px; background: #1e9c86; left: 53px; top: 46px; box-shadow: 0 0 32px rgba(30,156,134,0.5); }
      #s6 .peb-dot   { width: 21px; height: 21px; background: #fcfaf6; left: 45px; top: 47px; }
      #s6 .brand {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 100px; color: var(--cream); letter-spacing: -0.03em;
        text-shadow: 0 4px 36px rgba(5, 3, 2, 0.6);
      }
      #s6 .tagline { margin-top: 20px; font-weight: 500; font-size: 38px; color: var(--coral-light); }
      #s6 .cta {
        margin-top: 44px; display: inline-flex; align-items: center; gap: 14px;
        background: var(--coral); color: #fff;
        font-weight: 600; font-size: 26px; padding: 18px 36px; border-radius: 999px;
        box-shadow: 0 0 50px rgba(232, 93, 52, 0.42);
      }
      #scrim {
        position: absolute; inset: 0; z-index: 5; opacity: 0; pointer-events: none;
        background: radial-gradient(82% 72% at 50% 48%, rgba(10, 6, 4, 0.68) 0%, rgba(10, 6, 4, 0.4) 58%, rgba(10, 6, 4, 0.16) 100%);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="24" data-width="1920" data-height="1080">
      <audio id="bed" class="clip" src="assets/music.m4a" data-start="0" data-duration="24" data-track-index="9" data-volume="0.85"></audio>
      <div id="stage">
        <div id="bg" data-layout-ignore></div>
        <canvas id="three-layer" width="1920" height="1080" data-layout-ignore></canvas>
        <div id="vignette" data-layout-ignore></div>
        <div id="scrim" data-layout-ignore></div>
        <div id="grain" data-layout-ignore></div>

        <!-- 1 · foundation -->
        <div id="s1" class="scene">
          <div class="headline display">Agreement is <span class="accent">a foundation.</span></div>
        </div>

        <!-- 2 · build status -->
        <div id="s2" class="scene">
          <div class="status mono"><span class="pulse"></span>consensus reached — building</div>
        </div>

        <!-- 3 · built -->
        <div id="s3" class="scene">
          <div class="headline display">Built <span class="accent">on consensus.</span></div>
        </div>

        <!-- 6 · lockup -->
        <div id="s6" class="scene">
          <div class="lockrow">
            <div class="mark">
              <i class="peb-coral"></i><i class="peb-iris"></i><i class="peb-teal"></i><i class="peb-dot"></i>
            </div>
            <div class="brand display">Concilium</div>
          </div>
          <div class="tagline">Software by consensus.</div>
          <div class="cta">Convene your council <span>→</span></div>
        </div>
      </div>
    </div>

    <script src="assets/vendor/scene.js"></script>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const E = "power3.out";
        function scene(sel, start, end, inDur, outDur) {
          tl.fromTo(sel, { autoAlpha: 0 }, { autoAlpha: 1, duration: inDur, ease: "power2.out" }, start);
          tl.to(sel, { autoAlpha: 0, duration: outDur, ease: "power2.in" }, end - outDur);
        }

        /* 1 · foundation (0.5–4.4) over the god view */
        scene("#s1", 0.5, 4.4, 0.7, 0.5);
        tl.fromTo("#s1 .headline",
          { y: 42, opacity: 0, filter: "blur(12px)" },
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.9, ease: E }, 0.7);

        /* 2 · build caption rides the crane shot (5.4–14.2) */
        scene("#s2", 5.4, 14.2, 0.6, 0.6);
        tl.from("#s2 .status", { y: 26, opacity: 0, duration: 0.6, ease: E }, 5.6);
        tl.to("#s2 .pulse", { opacity: 0.35, duration: 0.5, yoyo: true, repeat: 8, ease: "power1.inOut" }, 5.8);

        /* 3 · built (15.4–19.2) on the hero wide */
        scene("#s3", 15.4, 19.2, 0.6, 0.5);
        tl.from("#s3 .headline", { y: 36, opacity: 0, duration: 0.7, ease: E }, 15.6);

        /* 6 · dark lockup over the pull-back (19.6–24) */
        tl.fromTo("#s6", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.6, ease: "power2.out" }, 19.6); // lockup holds to the end
        tl.from("#s6 .peb-coral", { x: -100, y: -74, opacity: 0, duration: 0.65, ease: "back.out(1.4)" }, 19.75);
        tl.from("#s6 .peb-iris",  { x: -118, y: 78, opacity: 0, duration: 0.65, ease: "back.out(1.4)" }, 19.85);
        tl.from("#s6 .peb-teal",  { x: 52, y: 118, opacity: 0, duration: 0.65, ease: "back.out(1.4)" }, 19.95);
        tl.from("#s6 .peb-dot",   { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2.2)" }, 20.45);
        tl.from("#s6 .brand", { x: -24, opacity: 0, duration: 0.6, ease: E }, 20.35);
        tl.from("#s6 .tagline", { y: 20, opacity: 0, duration: 0.55, ease: E }, 20.7);
        tl.from("#s6 .cta", { y: 20, opacity: 0, scale: 0.93, duration: 0.55, ease: "back.out(1.6)" }, 21.1);
        tl.to("#s6 .cta", { scale: 1.035, duration: 0.55, yoyo: true, repeat: 2, ease: "power1.inOut" }, 22.1);

        /* scrim grounds the lockup type against the bright scene */
        tl.fromTo("#scrim", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.7, ease: "power2.out" }, 19.6);

        /* anchor: pad the timeline to the composition end so seeks past the
           last tween never reset to initial state (blank final frames) */
        tl.set("#root", { autoAlpha: 1 }, 23.98);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
