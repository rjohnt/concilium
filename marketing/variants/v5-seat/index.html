<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="assets/vendor/gsap.min.js"></script>
    <script src="assets/vendor/three.min.js"></script>
    <style>
      @font-face {
        font-family: "Bricolage Grotesque";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Bricolage-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Hanken-normal.woff2") format("woff2");
      }
      :root {
        --coral: #e85d34; --coral-light: #f07e5c; --cream: #fcfaf6;
        --eng: #1e9c86;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #120c08; }
      body { font-family: "Hanken Grotesk", sans-serif; }
      .display { font-family: "Bricolage Grotesque", sans-serif; }

      #stage { position: absolute; inset: 0; width: 1920px; height: 1080px; }
      #bg {
        position: absolute; inset: 0; z-index: 0;
        background: radial-gradient(120% 90% at 50% 38%, #36291f 0%, #241a11 44%, #140d08 100%);
      }
      #three-layer { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
      #vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(115% 85% at 50% 42%, transparent 54%, rgba(8, 5, 3, 0.56) 100%);
      }
      #grain {
        position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: 0.05;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }
      #warmwash {
        position: absolute; inset: 0; z-index: 4; opacity: 0; pointer-events: none;
        background: radial-gradient(120% 100% at 50% 45%, #fffaf3 0%, #fdf3ea 45%, #f7e7d8 100%);
      }

      .scene {
        position: absolute; inset: 0; z-index: 6;
        display: flex; flex-direction: column; align-items: center;
        text-align: center; padding: 110px 180px;
        opacity: 0; visibility: hidden;
      }
      .headline {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; color: var(--cream);
        line-height: 1.05; letter-spacing: -0.025em;
        text-shadow: 0 4px 34px rgba(8, 5, 3, 0.6);
      }
      .accent { color: var(--coral-light); }

      /* type sits in the upper third; the chair is the star below */
      #s1, #s2 { justify-content: flex-start; padding-top: 128px; }
      #s1 .headline { font-size: 92px; }
      #s2 .headline { font-size: 88px; }
      #s2 .sub {
        margin-top: 22px; font-size: 30px; font-weight: 600;
        color: #e8ddcc; text-shadow: 0 3px 22px rgba(8, 5, 3, 0.7);
      }

      /* lockup */
      #s6 { justify-content: center; }
      #s6 .lockrow { display: flex; align-items: center; gap: 28px; }
      #s6 .mark { position: relative; width: 110px; height: 110px; }
      #s6 .mark i { position: absolute; border-radius: 50%; display: block; }
      #s6 .peb-coral { width: 42px; height: 42px; background: #e85d34; left: 34px; top: 12px; }
      #s6 .peb-iris  { width: 42px; height: 42px; background: #7a57d1; left: 15px; top: 46px; }
      #s6 .peb-teal  { width: 42px; height: 42px; background: #1e9c86; left: 53px; top: 46px; }
      #s6 .peb-dot   { width: 21px; height: 21px; background: #2b221c; left: 45px; top: 47px; }
      #s6 .brand {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 100px; color: #2b221c; letter-spacing: -0.03em;
      }
      #s6 .tagline { margin-top: 20px; font-weight: 500; font-size: 38px; color: #cf4a28; }
      #s6 .cta {
        margin-top: 44px; display: inline-flex; align-items: center; gap: 14px;
        background: var(--coral); color: #fff;
        font-weight: 600; font-size: 26px; padding: 18px 36px; border-radius: 999px;
        box-shadow: 0 18px 44px rgba(232, 93, 52, 0.32);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1920" data-height="1080">
      <audio id="bed" class="clip" src="assets/music.m4a" data-start="0" data-duration="12" data-track-index="9" data-volume="0.85"></audio>
      <div id="stage">
        <div id="bg" data-layout-ignore></div>
        <canvas id="three-layer" width="1920" height="1080" data-layout-ignore></canvas>
        <div id="vignette" data-layout-ignore></div>
        <div id="grain" data-layout-ignore></div>
        <div id="warmwash" data-layout-ignore></div>

        <!-- 1 · the held seat -->
        <div id="s1" class="scene">
          <div class="headline display">A seat is being held <span class="accent">for you.</span></div>
        </div>

        <!-- 2 · the promise -->
        <div id="s2" class="scene">
          <div class="headline display">AI keeps it warm <span class="accent">until you claim it.</span></div>
          <div class="sub">Engineer · Designer · Product Owner · QA</div>
        </div>

        <!-- 6 · lockup -->
        <div id="s6" class="scene">
          <div class="lockrow">
            <div class="mark">
              <i class="peb-coral"></i><i class="peb-iris"></i><i class="peb-teal"></i><i class="peb-dot"></i>
            </div>
            <div class="brand display">Concilium</div>
          </div>
          <div class="tagline">Software by consensus.</div>
          <div class="cta">Convene your council <span>→</span></div>
        </div>
      </div>
    </div>

    <script type="application/json" id="council-config">
      {
        "palette": "dark",
        "duration": 12,
        "beats": {
          "reveal": [0, 2.6],
          "seats": { "start": 5.2, "stagger": 0.12 },
          "focus": [1.8, 5.1],
          "consensus": [7.0, 9.2],
          "beam": [7.2, 9.6],
          "fadeOut": [8.6, 9.8]
        },
        "camera": {
          "orbitSpeed": 0.045, "orbitOffset": -1.62,
          "rFrom": 8.4, "rTo": 6.8, "hFrom": 4.8, "hTo": 3.2,
          "push": 0.9, "pushDrop": 0.35, "lookY": 0.1
        },
        "motes": true,
        "beam": true
      }
    </script>
    <script src="assets/vendor/council-scene.js"></script>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const E = "power3.out";
        function scene(sel, start, end, inDur, outDur) {
          tl.fromTo(sel, { autoAlpha: 0 }, { autoAlpha: 1, duration: inDur, ease: "power2.out" }, start);
          tl.to(sel, { autoAlpha: 0, duration: outDur, ease: "power2.in" }, end - outDur);
        }

        /* 1 · held seat (0.3–4.6) */
        scene("#s1", 0.3, 4.6, 0.7, 0.5);
        tl.fromTo("#s1 .headline",
          { y: 44, opacity: 0, filter: "blur(12px)" },
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.95, ease: E }, 0.55);

        /* 2 · the promise (4.7–8.6) */
        scene("#s2", 4.7, 8.6, 0.6, 0.5);
        tl.from("#s2 .headline", { y: 34, opacity: 0, duration: 0.7, ease: E }, 4.9);
        tl.from("#s2 .sub", { y: 20, opacity: 0, duration: 0.6, ease: E }, 5.4);

        /* warm bloom into the lockup */
        tl.fromTo("#warmwash", { autoAlpha: 0 }, { autoAlpha: 0.95, duration: 1.6, ease: "power2.inOut" }, 8.2);

        /* 6 · lockup (8.8–12) */
        tl.fromTo("#s6", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.6, ease: "power2.out" }, 8.8); // lockup holds to the end
        tl.from("#s6 .peb-coral", { x: -100, y: -74, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 8.95);
        tl.from("#s6 .peb-iris",  { x: -118, y: 78, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 9.05);
        tl.from("#s6 .peb-teal",  { x: 52, y: 118, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 9.15);
        tl.from("#s6 .peb-dot",   { scale: 0, opacity: 0, duration: 0.38, ease: "back.out(2.2)" }, 9.6);
        tl.from("#s6 .brand", { x: -22, opacity: 0, duration: 0.6, ease: E }, 9.5);
        tl.from("#s6 .tagline", { y: 18, opacity: 0, duration: 0.55, ease: E }, 9.85);
        tl.from("#s6 .cta", { y: 18, opacity: 0, scale: 0.93, duration: 0.5, ease: "back.out(1.6)" }, 10.2);
        tl.to("#s6 .cta", { scale: 1.04, duration: 0.5, yoyo: true, repeat: 1, ease: "power1.inOut" }, 10.9);

        /* anchor: pad the timeline to the composition end so seeks past the
           last tween never reset to initial state (blank final frames) */
        tl.set("#root", { autoAlpha: 1 }, 11.98);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
