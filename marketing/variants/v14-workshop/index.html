<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="assets/vendor/gsap.min.js"></script>
    <script src="assets/vendor/three.min.js"></script>
    <script src="assets/vendor/council-kit.js"></script>
    <style>
      @font-face {
        font-family: "Bricolage Grotesque";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Bricolage-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Hanken-normal.woff2") format("woff2");
      }
      :root { --coral: #e85d34; --coral-light: #f07e5c; --cream: #fcfaf6; --ink: #2b221c; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #241a10; }
      body { font-family: "Hanken Grotesk", sans-serif; }
      .display { font-family: "Bricolage Grotesque", sans-serif; }

      #stage { position: absolute; inset: 0; width: 1920px; height: 1080px; }
      #bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(125% 95% at 50% 34%, #4d3a22 0%, #352718 48%, #1d140b 100%); }
      #three-layer { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
      #vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(115% 85% at 50% 44%, transparent 56%, rgba(6,4,2,0.55) 100%);
      }
      #grain {
        position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: 0.05;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }
      
      #scrim {
        position: absolute; inset: 0; z-index: 5; opacity: 0; pointer-events: none;
        background: radial-gradient(82% 72% at 50% 48%, rgba(10,6,4,0.68) 0%, rgba(10,6,4,0.4) 58%, transparent 100%);
      }

      .scene {
        position: absolute; inset: 0; z-index: 6;
        display: flex; flex-direction: column; align-items: center;
        justify-content: flex-start; padding: 118px 180px;
        text-align: center; opacity: 0; visibility: hidden;
      }
      .headline {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; color: var(--cream);
        line-height: 1.06; letter-spacing: -0.025em;
        text-shadow: 0 4px 36px rgba(5,3,2,0.66);
      }
      .accent { color: var(--coral-light); }
      #s1 .headline { font-size: 104px; max-width: 1500px; }
      #s2 .headline { font-size: 96px; max-width: 1500px; }
      #s3 .headline { font-size: 104px; max-width: 1500px; }

      #s6 { justify-content: center; }
      #s6 .lockrow { display: flex; align-items: center; gap: 28px; }
      #s6 .marksvg { width: 116px; height: 116px; overflow: visible; }
      #s6 .brand {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 100px; color: var(--cream); letter-spacing: -0.03em;
        text-shadow: 0 4px 36px rgba(5,3,2,0.66);
      }
      #s6 .tagline { margin-top: 20px; font-weight: 500; font-size: 38px; color: var(--coral-light); }
      #s6 .cta {
        margin-top: 44px; display: inline-flex; align-items: center; gap: 14px;
        background: var(--coral); color: #fff;
        font-weight: 600; font-size: 26px; padding: 18px 36px; border-radius: 999px;
        box-shadow: 0 0 50px rgba(232, 93, 52, 0.4);
      }

      /* settled elements: quad-mark lockup, CTA-2 line, A/E interstitials */
      #s6 .marksvg { width: 112px; height: 112px; overflow: visible; }
      .ctaline2 {
        margin-top: 44px; font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 36px; letter-spacing: -0.02em; color: #fcfaf6;
      }
      .dots4 { display: inline-flex; gap: 9px; margin-left: 14px; vertical-align: middle; }
      .dots4 b { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
      .ulbar { height: 6px; border-radius: 3px; background: #E85D34; margin-top: 20px; width: 280px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="22" data-width="1920" data-height="1080">
      <audio id="bed" class="clip" src="assets/music.m4a" data-start="0" data-duration="22" data-track-index="9" data-volume="0.85"></audio>
      <div id="stage">
        <div id="bg" data-layout-ignore></div>
        <canvas id="three-layer" width="1920" height="1080" data-layout-ignore></canvas>
        <div id="vignette" data-layout-ignore></div>
        
        <div id="scrim" data-layout-ignore></div>
        <div id="grain" data-layout-ignore></div>

        <div id="s1" class="scene"><div class="headline display">Every craft <span class="accent">at the table.</span></div></div>
        <div id="s2" class="scene"><div class="headline display">Wrench, brush, <span class="accent">spec &amp; lens.</span></div></div>
        <div id="s3" class="scene"><div class="headline display">Tools down. <span class="accent">Consensus.</span></div></div>

        <!-- lockup: the exact council mark from public/brand/logo-mark.svg -->
        <div id="s6" class="scene">
          <div class="lockrow">
            <svg class="marksvg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Concilium">
              <g transform="rotate(45 60 60)">
                <g class="pq1"><circle cx="44" cy="44" r="24" fill="#7A57D1"></circle></g>
                <g class="pq2"><circle cx="76" cy="44" r="24" fill="#D9962A"></circle></g>
                <g class="pq3"><circle cx="44" cy="76" r="24" fill="#2F82C7"></circle></g>
                <g class="pq4"><circle cx="76" cy="76" r="24" fill="#1E9C86"></circle></g>
              </g>
              <g class="dotg"><circle cx="60" cy="60" r="14" fill="#FCFAF6"></circle></g>
            </svg>
            <div class="brand display">Concilium</div>
          </div>
          <div class="ctaline2">Convene your council.<span class="dots4"><b style="background:#7A57D1"></b><b style="background:#D9962A"></b><b style="background:#1E9C86"></b><b style="background:#2F82C7"></b></span></div>
        </div>
      </div>
    </div>

    <script src="assets/vendor/scene.js"></script>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const E = "power3.out";
        function showScene(sel, start, end, inDur, outDur) {
          tl.fromTo(sel, { autoAlpha: 0 }, { autoAlpha: 1, duration: inDur, ease: "power2.out" }, start);
          tl.to(sel, { autoAlpha: 0, duration: outDur, ease: "power2.in" }, end - outDur);
        }

        showScene("#s1", 0.8, 4.4, 0.7, 0.5);
        tl.fromTo("#s1 .headline",
          { y: 42, opacity: 0, filter: "blur(12px)" },
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.9, ease: E }, 0.8 + 0.2);

        showScene("#s2", 5.4, 9.4, 0.6, 0.5);
        tl.from("#s2 .headline", { y: 32, opacity: 0, duration: 0.7, ease: E }, 5.4 + 0.2);

        showScene("#s3", 15.2, 17.8, 0.55, 0.5);
        tl.from("#s3 .headline", { y: 32, opacity: 0, duration: 0.65, ease: E }, 15.2 + 0.2);

        
        tl.fromTo("#scrim", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.7, ease: "power2.out" }, 18.4);

        /* lockup — exact-asset pebbles converge, holds to the end */
        tl.fromTo("#s6", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.6, ease: "power2.out" }, 18.4);
        tl.from("#s6 .pq1", { x: -72, y: -72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 18.4 + 0.15);
        tl.from("#s6 .pq2", { x: 72, y: -72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 18.4 + 0.15 + 0.12);
        tl.from("#s6 .pq3", { x: -72, y: 72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 18.4 + 0.15 + 0.24);
        tl.from("#s6 .pq4", { x: 72, y: 72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 18.4 + 0.15 + 0.36);
        tl.from("#s6 .dotg", { scale: 0, svgOrigin: "60 60", opacity: 0, duration: 0.4, ease: "back.out(2)" }, 18.4 + 0.15 + 0.66);
        tl.from("#s6 .brand", { x: -24, opacity: 0, duration: 0.6, ease: E }, 18.4 + 0.75);
        tl.from("#s6 .ctaline2", { y: 20, opacity: 0, duration: 0.55, ease: E }, 18.4 + 1.5);
        tl.from("#s6 .dots4 b", { scale: 0, opacity: 0, duration: 0.26, stagger: 0.11, ease: "back.out(2)" }, 18.4 + 1.5 + 0.5);

        /* anchor: pad the timeline to the composition end */
        tl.set("#root", { autoAlpha: 1 }, 21.98);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
