<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="assets/vendor/gsap.min.js"></script>
    <script src="assets/vendor/three.min.js"></script>
    <style>
      @font-face {
        font-family: "Bricolage Grotesque";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Bricolage-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal; font-weight: 100 900; font-display: block;
        src: url("assets/fonts/Hanken-normal.woff2") format("woff2");
      }
      :root {
        --coral: #e85d34; --coral-light: #f07e5c; --cream: #fcfaf6;
        --eng: #1e9c86; --des: #7a57d1; --prod: #d9962a; --qa: #2f82c7;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0d0805; }
      body { font-family: "Hanken Grotesk", sans-serif; }
      .display { font-family: "Bricolage Grotesque", sans-serif; }

      #stage { position: absolute; inset: 0; width: 1920px; height: 1080px; }
      #bg {
        position: absolute; inset: 0; z-index: 0;
        background: radial-gradient(120% 90% at 50% 36%, #2c2018 0%, #1b1209 45%, #0d0805 100%);
      }
      #three-layer { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
      #vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(115% 85% at 50% 42%, transparent 52%, rgba(5, 3, 2, 0.62) 100%);
      }
      #grain {
        position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: 0.06;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }

      .scene {
        position: absolute; inset: 0; z-index: 6;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 120px 180px;
        opacity: 0; visibility: hidden;
      }
      .headline {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; color: var(--cream);
        line-height: 1.04; letter-spacing: -0.025em;
        text-shadow: 0 4px 38px rgba(0, 0, 0, 0.65);
      }
      .accent { color: var(--coral-light); }

      #s1 .headline { font-size: 108px; max-width: 1500px; }
      #s2 { justify-content: flex-start; padding-top: 140px; }
      #s2 .headline { font-size: 100px; }
      .persona-strip { display: flex; justify-content: center; gap: 16px; margin-top: 54px; }
      .pchip {
        display: inline-flex; align-items: center; gap: 10px;
        padding: 13px 24px; border-radius: 999px;
        background: rgba(20, 13, 8, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 23px; font-weight: 600; color: var(--cream);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(6px);
      }
      .pchip .dot { width: 15px; height: 15px; border-radius: 50%; }

      #s3 .headline { font-size: 112px; }
      #s4 .headline { font-size: 96px; max-width: 1480px; }

      #s5 .headline { font-size: 110px; }
      #s5 .seal {
        margin-bottom: 40px;
        width: 200px; height: 200px; border-radius: 50%;
        border: 6px solid var(--coral);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: var(--coral-light);
        background: rgba(232, 93, 52, 0.08);
        box-shadow: 0 0 60px rgba(232, 93, 52, 0.35), inset 0 0 30px rgba(232, 93, 52, 0.12);
      }
      #s5 .seal-word {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 29px; letter-spacing: 0.05em; text-transform: uppercase;
      }
      #s5 .seal-sub { font-size: 13px; letter-spacing: 0.32em; text-transform: uppercase; opacity: 0.85; }

      /* dark lockup — glowing mark, cream wordmark */
      #s6 .lockrow { display: flex; align-items: center; gap: 30px; }
      #s6 .mark { position: relative; width: 116px; height: 116px; }
      #s6 .mark i { position: absolute; border-radius: 50%; display: block; }
      #s6 .peb-coral { width: 44px; height: 44px; background: #e85d34; left: 36px; top: 13px; box-shadow: 0 0 34px rgba(232,93,52,0.55); }
      #s6 .peb-iris  { width: 44px; height: 44px; background: #7a57d1; left: 16px; top: 48px; box-shadow: 0 0 34px rgba(122,87,209,0.5); }
      #s6 .peb-teal  { width: 44px; height: 44px; background: #1e9c86; left: 56px; top: 48px; box-shadow: 0 0 34px rgba(30,156,134,0.5); }
      #s6 .peb-dot   { width: 22px; height: 22px; background: #fcfaf6; left: 47px; top: 49px; }
      #s6 .brand {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 104px; color: var(--cream); letter-spacing: -0.03em;
      }
      #s6 .tagline { margin-top: 22px; font-weight: 500; font-size: 40px; color: var(--coral-light); }
      #s6 .cta {
        margin-top: 46px; display: inline-flex; align-items: center; gap: 14px;
        background: var(--coral); color: #fff;
        font-weight: 600; font-size: 27px; padding: 19px 38px; border-radius: 999px;
        box-shadow: 0 0 54px rgba(232, 93, 52, 0.45);
      }
      #scrim {
        position: absolute; inset: 0; z-index: 5; opacity: 0; pointer-events: none;
        background: radial-gradient(82% 72% at 50% 48%, rgba(10, 6, 4, 0.68) 0%, rgba(10, 6, 4, 0.4) 58%, rgba(10, 6, 4, 0.16) 100%);
      }

      /* settled elements: quad-mark lockup, CTA-2 line, A/E interstitials */
      #s6 .marksvg { width: 112px; height: 112px; overflow: visible; }
      .ctaline2 {
        margin-top: 44px; font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700; font-size: 36px; letter-spacing: -0.02em; color: #fcfaf6;
      }
      .dots4 { display: inline-flex; gap: 9px; margin-left: 14px; vertical-align: middle; }
      .dots4 b { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
      .ulbar { height: 6px; border-radius: 3px; background: #E85D34; margin-top: 20px; width: 280px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1920" data-height="1080">
      <audio id="bed" class="clip" src="assets/music.m4a" data-start="0" data-duration="20" data-track-index="9" data-volume="0.85"></audio>
      <div id="stage">
        <div id="bg" data-layout-ignore></div>
        <canvas id="three-layer" width="1920" height="1080" data-layout-ignore></canvas>
        <div id="vignette" data-layout-ignore></div>
        <div id="scrim" data-layout-ignore></div>
        <div id="grain" data-layout-ignore></div>

        <!-- 1 · the question -->
        <div id="s1" class="scene">
          <div class="headline display">Who&rsquo;s in the room <span class="accent">when AI builds?</span></div>
        </div>

        <!-- 2 · the council answers -->
        <div id="s2" class="scene">
          <div class="headline display">Your council is.</div>
          <div class="persona-strip">
            <span class="pchip pc"><span class="dot" style="background: var(--eng)"></span>Ada · Engineer</span>
            <span class="pchip pc"><span class="dot" style="background: var(--des)"></span>Iris · Designer</span>
            <span class="pchip pc"><span class="dot" style="background: var(--prod)"></span>Pam · Product</span>
            <span class="pchip pc"><span class="dot" style="background: var(--qa)"></span>Ray · QA</span>
          </div>
        </div>

        <!-- 3 · every voice -->
        <div id="s3" class="scene">
          <div class="headline display">Every voice. <span class="accent">Every ticket.</span></div>
        </div>

        <!-- 4 · your seat -->
        <div id="s4" class="scene">
          <div class="headline display">AI holds the seat <span class="accent">until you take it.</span></div>
        </div>

        <!-- 5 · consensus (dark) -->
        <div id="s5" class="scene">
          <div class="headline display"><span class="al1" style="display:block">Consensus reached.</span><span class="al2 accent" style="display:block">The build begins.</span></div>
          <div class="ulbar"></div>
        </div>

        <!-- 6 · dark lockup -->
        <div id="s6" class="scene">
          <div class="lockrow">
            <svg class="marksvg" viewBox="0 0 120 120" fill="none">
              <g transform="rotate(45 60 60)">
                <g class="pq1"><circle cx="44" cy="44" r="24" fill="#7A57D1"></circle></g>
                <g class="pq2"><circle cx="76" cy="44" r="24" fill="#D9962A"></circle></g>
                <g class="pq3"><circle cx="44" cy="76" r="24" fill="#2F82C7"></circle></g>
                <g class="pq4"><circle cx="76" cy="76" r="24" fill="#1E9C86"></circle></g>
              </g>
              <g class="dotg"><circle cx="60" cy="60" r="14" fill="#FCFAF6"></circle></g>
            </svg>
            <div class="brand display">Concilium</div>
          </div>
          <div class="ctaline2">Convene your council.<span class="dots4"><b style="background:#7A57D1"></b><b style="background:#D9962A"></b><b style="background:#1E9C86"></b><b style="background:#2F82C7"></b></span></div>
        </div>
      </div>
    </div>

    <script type="application/json" id="council-config">
      {
        "palette": "dark",
        "duration": 20,
        "beats": {
          "reveal": [0, 2.8],
          "seats": { "start": 3.0, "stagger": 0.5 },
          "focus": [9.2, 12.4],
          "consensus": [12.5, 15.0],
          "beam": [12.7, 15.6],
          "fadeOut": [16.0, 17.2]
        },
        "camera": {
          "orbitSpeed": 0.14, "orbitOffset": -0.85,
          "rFrom": 9.0, "rTo": 7.4, "hFrom": 5.3, "hTo": 3.2,
          "push": 1.5, "pushDrop": 0.55, "lookY": 0.1
        },
        "motes": true,
        "beam": true
      }
    </script>
    <script src="assets/vendor/council-scene.js"></script>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const E = "power3.out";
        function scene(sel, start, end, inDur, outDur) {
          tl.fromTo(sel, { autoAlpha: 0 }, { autoAlpha: 1, duration: inDur, ease: "power2.out" }, start);
          tl.to(sel, { autoAlpha: 0, duration: outDur, ease: "power2.in" }, end - outDur);
        }

        /* 1 · the question (0.2–3.2) */
        scene("#s1", 0.2, 3.2, 0.55, 0.45);
        tl.fromTo("#s1 .headline",
          { y: 50, opacity: 0, filter: "blur(14px)" },
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.85, ease: E }, 0.35);

        /* 2 · the council answers (3.2–6.4) */
        scene("#s2", 3.2, 6.4, 0.45, 0.45);
        tl.from("#s2 .headline", { scale: 0.88, opacity: 0, duration: 0.55, ease: "back.out(1.6)" }, 3.3);
        tl.from("#s2 .pc", { y: 34, opacity: 0, duration: 0.4, stagger: 0.48, ease: "back.out(1.8)" }, 3.5);

        /* 3 · every voice (6.4–9.2) */
        scene("#s3", 6.4, 9.2, 0.45, 0.45);
        tl.from("#s3 .headline", { y: 40, opacity: 0, duration: 0.6, ease: E }, 6.55);

        /* 4 · your seat (9.2–12.4) */
        scene("#s4", 9.2, 12.4, 0.5, 0.45);
        tl.from("#s4 .headline", { y: 40, opacity: 0, duration: 0.7, ease: E }, 9.4);

        /* 5 · consensus (12.6–16.2) */
        scene("#s5", 12.6, 16.2, 0.5, 0.5);

        /* 6 · dark lockup (16.3–20) */
        tl.fromTo("#s6", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.6, ease: "power2.out" }, 16.3); // lockup holds to the end
        tl.from("#s6 .pq1", { x: -72, y: -72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 16.45);
        tl.from("#s6 .pq2", { x: 72, y: -72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 16.45 + 0.12);
        tl.from("#s6 .pq3", { x: -72, y: 72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 16.45 + 0.24);
        tl.from("#s6 .pq4", { x: 72, y: 72, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 16.45 + 0.36);
        tl.from("#s6 .dotg", { scale: 0, svgOrigin: "60 60", opacity: 0, duration: 0.4, ease: "back.out(2)" }, 16.45 + 0.66);
        tl.from("#s6 .brand", { x: -24, opacity: 0, duration: 0.6, ease: E }, 17.0);
        tl.from("#s6 .ctaline2", { y: 20, opacity: 0, duration: 0.55, ease: E }, 17.8);
        tl.from("#s6 .dots4 b", { scale: 0, opacity: 0, duration: 0.26, stagger: 0.11, ease: "back.out(2)" }, 17.8 + 0.5);

        /* scrim grounds the lockup type against the bright scene */
        tl.fromTo("#scrim", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.7, ease: "power2.out" }, 16.3);

        /* anchor: pad the timeline to the composition end so seeks past the
           last tween never reset to initial state (blank final frames) */
        tl.set("#root", { autoAlpha: 1 }, 19.98);

        
        tl.from("#s5 .al1", { y: 26, opacity: 0, duration: 0.5, ease: E }, 12.9);
        tl.from("#s5 .al2", { y: 26, opacity: 0, duration: 0.5, ease: E }, 12.9 + 0.2);
        tl.fromTo("#s5 .ulbar", { width: 0 }, { width: 280, duration: 0.4, ease: E }, 12.9 + 0.55);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
